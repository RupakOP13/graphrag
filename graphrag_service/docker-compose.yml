services:
  tigergraph:
    image: tigergraph/community:4.2.2
    container_name: tigergraph
    platform: linux/amd64
    ports:
      - "14240:14240"
    volumes:
      - tigergraph_data:/home/tigergraph/tigergraph/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14240/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  graphrag-ecc:
    image: tigergraph/graphrag-ecc:latest
    platform: linux/amd64
    container_name: graphrag-ecc
    ports:
      - 8001:8001
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      INIT_EMBED_STORE: "false"
    volumes:
      - ./configs/:/code/configs
    depends_on:
      tigergraph:
        condition: service_healthy

  chat-history:
    image: tigergraph/chat-history:latest
    platform: linux/amd64
    container_name: chat-history
    ports:
      - 8002:8002
    environment:
      CONFIG_FILES: "/configs/server_config.json"
      LOGLEVEL: "INFO"
    volumes:
      - ./configs/:/configs

  graphrag:
    image: tigergraph/graphrag:latest
    platform: linux/amd64
    container_name: graphrag
    ports:
      - 8000:8000
    depends_on:
      - graphrag-ecc
      - chat-history
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      USE_CYPHER: "true"
    volumes:
      - ./configs/:/code/configs
      - ../dataset/data/:/data/

volumes:
  tigergraph_data:
